opencollection: 1.0.0

info:
  name: GatewayEntertainment
config:
  proxy:
    inherit: true
    config:
      protocol: http
      hostname: ""
      port: ""
      auth:
        username: ""
        password: ""
      bypassProxy: ""

request:
  headers:
    - name: Bearer
      value: "{{accessToken}}"
      disabled: true
  auth:
    type: bearer
    token: "{{accessToken}}"
bundled: false
extensions:
  bruno:
    ignore:
      - node_modules
      - .git
