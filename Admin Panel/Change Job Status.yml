info:
  name: Change Job Status
  type: http
  seq: 5

http:
  method: PATCH
  url: "{{local_base}}/api/v1/jobs/admin/jobs/1/status/"
  body:
    type: json
    data: |-
      {
        "status": "closed"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
