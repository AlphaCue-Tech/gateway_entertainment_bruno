runtime:
  scripts:
    - type: after-response
      code: |-
        const data = res.getBody();

        bru.setEnvVar("accessToken", data.access);
        bru.setEnvVar("refreshToken", data.refresh);
    - type: tests
      code: |-
        const data = res.getBody();

        bru.setEnvVar("accessToken", data.access);
        bru.setEnvVar("refreshToken", data.refresh);

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
